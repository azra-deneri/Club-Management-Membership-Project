# === Server ===
server.port=8080
server.servlet.context-path=/

# === Thymeleaf ===
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# === Logging ===
logging.level.com.iscms=DEBUG
logging.level.org.springframework.web=INFO

spring.application.name=ISC-MS

# Let GlobalExceptionHandler handle 404s instead of Spring's default fallback.
# Without this, NoHandlerFoundException is never thrown and our 404 handler
# never fires ? Spring serves its own /error page instead.
spring.mvc.throw-exception-if-no-handler-found=true
