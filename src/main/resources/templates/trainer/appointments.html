<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments — ISC-MS</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 1200px; margin: 32px auto; padding: 28px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
        }
        h1 { margin: 0; color: #1d1d1f; font-size: 24px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }

        .alert {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
            font-size: 13px;
        }
        .alert-success { background: #f6ffed; border: 1px solid #b7eb8f; color: #135200; }
        .alert-error   { background: #fff2f0; border: 1px solid #ffa39e; color: #820014; }

        .tabs {
            display: flex; gap: 4px; border-bottom: 1px solid #e0e0e3;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .tab {
            padding: 10px 16px; font-size: 13px;
            color: #6e6e73; border-bottom: 2px solid transparent;
            text-decoration: none;
        }
        .tab.active { color: #0071e3; border-bottom-color: #0071e3; font-weight: 600; }
        .tab .count {
            display: inline-block; margin-left: 4px; padding: 1px 8px;
            background: #f5f5f7; border-radius: 10px; font-size: 11px;
            color: #6e6e73;
        }
        .tab.active .count { background: #e6f4ff; color: #0071e3; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f5f5f7; }
        th {
            text-align: left; padding: 10px 12px; font-size: 11px; color: #6e6e73;
            text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid #e0e0e3;
        }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; color: #1d1d1f; }
        tr:hover { background: #fafafa; }

        .pill {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
        }
        .pill-SCHEDULED { background: #e6f4ff; color: #0050b3; }
        .pill-COMPLETED { background: #f6ffed; color: #135200; }
        .pill-NO_SHOW   { background: #fff2f0; color: #cf1322; }
        .pill-CANCELLED { background: #f5f5f7; color: #8c8c8c; }

        .actions { display: flex; gap: 6px; }
        .btn {
            padding: 6px 12px; font-size: 12px; border-radius: 6px;
            border: none; cursor: pointer; font-family: inherit;
            text-decoration: none; display: inline-block;
        }
        .btn-complete { background: #52c41a; color: white; }
        .btn-noshow   { background: #cf1322; color: white; }

        .empty-state {
            text-align: center; padding: 32px; color: #6e6e73;
            font-size: 14px; font-style: italic;
            background: #fafafa; border-radius: 8px;
        }

        .filter-bar {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            background: #fafafa; padding: 14px 16px; border-radius: 10px;
            margin: 12px 0 18px; font-size: 13px;
        }
        .filter-bar select,
        .filter-bar input[type="text"],
        .filter-bar input[type="date"] {
            padding: 7px 10px; border: 1px solid #d2d2d7; border-radius: 6px;
            font-size: 13px; font-family: inherit; background: white;
        }
        .filter-bar input[type="text"] { min-width: 180px; }
        .filter-bar .dash { color: #6e6e73; }
        .btn-apply {
            padding: 7px 16px; background: #0071e3; color: white;
            border: none; border-radius: 6px; font-size: 13px;
            font-weight: 500; cursor: pointer;
        }
        .btn-reset {
            padding: 7px 16px; background: #f5f5f7; color: #1d1d1f;
            border: 1px solid #d2d2d7; border-radius: 6px; font-size: 13px;
            text-decoration: none; font-weight: 500;
        }
        .btn-cancel { background: #cf1322; color: white; }
    </style>

</head>
<body>
<div class="container">
    <div class="header">
        <h1>My Appointments</h1>
        <a th:href="@{/dashboard}" class="top-link">← Back to Dashboard</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div class="tabs">
        <a th:href="@{/trainer/appointments(filter='upcoming')}" class="tab"
           th:classappend="${filter == 'upcoming'} ? 'active' : ''">
            Upcoming <span class="count" th:text="${upcomingCount}">0</span>
        </a>
        <a th:href="@{/trainer/appointments(filter='past')}" class="tab"
           th:classappend="${filter == 'past'} ? 'active' : ''">
            Past <span class="count" th:text="${pastCount}">0</span>
        </a>
        <a th:href="@{/trainer/appointments(filter='cancelled')}" class="tab"
           th:classappend="${filter == 'cancelled'} ? 'active' : ''">
            Cancelled <span class="count" th:text="${cancelledCount}">0</span>
        </a>
    </div>

    <form method="get" th:action="@{/trainer/appointments}" class="filter-bar">
        <input type="hidden" name="filter" th:value="${filter}">
        <select name="status">
            <option value="ALL"       th:selected="${statusFilter == ''}">All statuses</option>
            <option value="SCHEDULED" th:selected="${statusFilter == 'SCHEDULED'}">Scheduled</option>
            <option value="COMPLETED" th:selected="${statusFilter == 'COMPLETED'}">Completed</option>
            <option value="NO_SHOW"   th:selected="${statusFilter == 'NO_SHOW'}">No-show</option>
            <option value="CANCELLED" th:selected="${statusFilter == 'CANCELLED'}">Cancelled</option>
        </select>
        <input type="text" name="memberQuery" placeholder="Search member name"
               th:value="${memberQuery}">
        <input type="date" name="dateFrom" th:value="${dateFrom}">
        <span class="dash">–</span>
        <input type="date" name="dateTo" th:value="${dateTo}">
        <button type="submit" class="btn-apply">Apply</button>
        <a th:href="@{/trainer/appointments(filter=${filter})}" class="btn-reset">Reset</a>
    </form>

    <table th:if="${!rows.isEmpty()}">
        <thead>
        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Member</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${rows}">
            <td th:text="${r.appointmentDate}">2026-05-26</td>
            <td th:text="${#temporals.format(r.startTime, 'HH:mm')} + ' – ' + ${#temporals.format(r.endTime, 'HH:mm')}">09:00 – 10:00</td>
            <td th:text="${r.memberName}">Member Name</td>
            <td>
                <span class="pill"
                      th:classappend="'pill-' + ${r.status}"
                      th:text="${r.status}">SCHEDULED</span>
            </td>
            <td>
                <div class="actions" th:if="${r.canMarkOutcome or r.canCancel}">
                    <form th:if="${r.canMarkOutcome}"
                          th:action="@{'/trainer/appointments/' + ${r.appointmentId} + '/complete'}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn btn-complete">Mark Complete</button>
                    </form>
                    <form th:if="${r.canMarkOutcome}"
                          th:action="@{'/trainer/appointments/' + ${r.appointmentId} + '/no-show'}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn btn-noshow">No Show</button>
                    </form>
                    <form th:if="${r.canCancel}"
                          th:action="@{'/trainer/appointments/' + ${r.appointmentId} + '/cancel'}"
                          method="post" style="display: inline;"
                          onsubmit="return confirm('Cancel this appointment? The member will be notified.');">
                        <button type="submit" class="btn btn-cancel">Cancel</button>
                    </form>
                </div>
                <span th:if="${!r.canMarkOutcome and !r.canCancel}"
                      style="color: #6e6e73; font-size: 12px;">—</span>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="empty-state" th:if="${rows.isEmpty()}">
        <span th:if="${filter == 'upcoming'}">No upcoming appointments.</span>
        <span th:if="${filter == 'past'}">No past appointments.</span>
        <span th:if="${filter == 'cancelled'}">No cancelled appointments.</span>
    </div>
</div>
</body>
</html>
