<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — ISC-MS</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 460px; margin: 60px auto; padding: 32px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 { margin: 0 0 4px; color: #21578d; font-size: 22px; text-align: center; }
        .subtitle { text-align: center; color: #6e6e73; font-size: 13px; margin-bottom: 22px; }

        .alert { padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }

        .role-row {
            display: flex; gap: 16px; justify-content: center;
            margin-bottom: 18px; font-size: 14px;
        }
        .role-row label { display: inline-flex; gap: 6px; align-items: center; cursor: pointer; }

        .field { margin-bottom: 14px; }
        .field label {
            display: block; font-size: 12px; color: #6e6e73;
            margin-bottom: 5px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .field input {
            width: 100%; padding: 10px 12px; font-size: 14px;
            border: 1px solid #d2d2d7; border-radius: 6px;
            box-sizing: border-box; font-family: inherit;
        }
        .field input:focus { outline: none; border-color: #0071e3; }
        .hint { font-size: 11px; color: #6e6e73; margin-top: 4px; }

        .actions { margin-top: 18px; }
        .btn {
            display: block; width: 100%; padding: 11px 22px;
            font-size: 15px; font-weight: 500;
            border-radius: 6px; border: none; cursor: pointer;
            text-decoration: none; text-align: center;
            background: #21578d; color: white; box-sizing: border-box;
        }
        .back-link {
            display: block; text-align: center; margin-top: 14px;
            font-size: 13px; color: #6e6e73; text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Reset Password</h1>
    <p class="subtitle">Choose your role, then enter your identifier and a new password.</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/forgot-password}" id="resetForm">
        <div class="role-row">
            <label>
                <input type="radio" name="role" value="MEMBER"
                       th:checked="${role == 'MEMBER'}" onchange="updateLabel()"/>
                Member
            </label>
            <label>
                <input type="radio" name="role" value="MANAGER"
                       th:checked="${role == 'MANAGER'}" onchange="updateLabel()"/>
                Manager
            </label>
            <label>
                <input type="radio" name="role" value="TRAINER"
                       th:checked="${role == 'TRAINER'}" onchange="updateLabel()"/>
                Trainer
            </label>
        </div>

        <div class="field">
            <label id="identifier-label">Phone Number</label>
            <input type="text" name="identifier" th:value="${identifier}" required/>
            <div class="hint" id="identifier-hint">
                Members reset by phone, managers by email, trainers by username.
            </div>
        </div>

        <div class="field">
            <label>New Password</label>
            <input type="password" name="newPassword" required minlength="8" maxlength="100"
                   autocomplete="new-password"/>
            <div class="hint">Minimum 8 characters. Must be different from your current password.</div>
        </div>

        <div class="field">
            <label>Confirm New Password</label>
            <input type="password" name="confirmPassword" required minlength="8" maxlength="100"
                   autocomplete="new-password"/>
        </div>

        <div class="actions">
            <button type="submit" class="btn">Reset Password</button>
        </div>

        <a th:href="@{/login}" class="back-link">← Back to Login</a>
    </form>
</div>

<script>
    // Mirror the Swing form: the identifier label switches when the role changes.
    function updateLabel() {
        var role = document.querySelector('input[name="role"]:checked').value;
        var label = document.getElementById('identifier-label');
        if (role === 'MEMBER')       label.textContent = 'Phone Number';
        else if (role === 'MANAGER') label.textContent = 'Email';
        else                          label.textContent = 'Username';
    }
    updateLabel();
</script>
</body>
</html>
