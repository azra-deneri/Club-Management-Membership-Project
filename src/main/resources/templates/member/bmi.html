<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ISC-MS — BMI Calculator</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 720px; margin: 40px auto; padding: 32px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 24px; }
        h1 { margin: 0; color: #1d1d1f; }
        h2 { color: #1d1d1f; margin: 28px 0 12px; font-size: 18px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }
        .alert {
            padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px;
        }
        .alert-error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }
        .alert-info  { background: #e6f7ff; border: 1px solid #91d5ff; color: #0050b3; }

        /* Form card */
        .form-card {
            background: #f9f9fb; border: 1px solid #e0e0e3;
            border-radius: 10px; padding: 22px; margin-bottom: 20px;
        }
        .form-row {
            display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label {
            font-size: 11px; color: #6e6e73;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .field input {
            padding: 10px 12px; font-size: 14px;
            border: 1px solid #d2d2d7; border-radius: 6px;
            background: white; min-width: 160px;
        }
        .field input:focus { outline: none; border-color: #0071e3; }
        .btn-primary {
            padding: 11px 22px; background: #0071e3; color: white;
            border: none; border-radius: 6px; font-size: 14px;
            cursor: pointer; font-weight: 500;
        }
        .btn-primary:hover { background: #0077ed; }

        /* Result card */
        .result-card {
            border-radius: 12px; padding: 24px;
            margin-bottom: 20px;
        }
        .result-Underweight { background: #e6f7ff; border: 1px solid #91d5ff; }
        .result-Normal      { background: #f6ffed; border: 1px solid #b7eb8f; }
        .result-Overweight  { background: #fffbe6; border: 1px solid #ffe58f; }
        .result-Obese       { background: #fff2f0; border: 1px solid #ffccc7; }

        .bmi-value-row {
            display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .bmi-value {
            font-size: 42px; font-weight: 700; color: #1d1d1f;
            font-variant-numeric: tabular-nums;
        }
        .bmi-category {
            font-size: 18px; font-weight: 600; padding: 4px 12px;
            border-radius: 16px;
        }
        .bmi-category.Underweight { background: #91d5ff; color: #003a8c; }
        .bmi-category.Normal      { background: #b7eb8f; color: #135200; }
        .bmi-category.Overweight  { background: #ffe58f; color: #874d00; }
        .bmi-category.Obese       { background: #ffa39e; color: #820014; }

        .bmi-meta {
            font-size: 13px; color: #6e6e73;
            display: flex; gap: 18px; flex-wrap: wrap;
        }

        /* Daily calorie target */
        .calorie-card {
            display: inline-flex; align-items: baseline; gap: 8px;
            background: white; padding: 8px 14px; border-radius: 8px;
            border: 1px solid #e0e0e3; margin-top: 12px;
        }
        .calorie-card .num {
            font-weight: 700; font-size: 18px; color: #21548d;
            font-variant-numeric: tabular-nums;
        }
        .calorie-card .lbl { font-size: 12px; color: #6e6e73; }

        /* Suggestions */
        .suggestions { margin-top: 14px; }
        .suggestions h3 {
            font-size: 14px; color: #1d1d1f; margin: 0 0 8px 0;
        }
        .suggestion-list { margin: 0; padding-left: 22px; }
        .suggestion-list li {
            font-size: 13px; color: #1d1d1f; margin-bottom: 5px;
            line-height: 1.5;
        }

        /* BMI scale reference */
        .scale {
            margin-top: 22px; padding: 14px;
            background: #f9f9fb; border: 1px solid #e0e0e3;
            border-radius: 8px;
        }
        .scale h3 { font-size: 13px; color: #6e6e73; margin: 0 0 10px 0;
                    text-transform: uppercase; letter-spacing: 0.5px; }
        .scale-row {
            display: flex; gap: 8px; flex-wrap: wrap;
            font-size: 12px;
        }
        .scale-row span {
            padding: 3px 10px; border-radius: 4px;
        }
        .scale-Underweight { background: #e6f7ff; color: #003a8c; }
        .scale-Normal      { background: #f6ffed; color: #135200; }
        .scale-Overweight  { background: #fffbe6; color: #874d00; }
        .scale-Obese       { background: #fff2f0; color: #820014; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>BMI Calculator</h1>
        <a th:href="@{/dashboard}" class="top-link">← Back to Dashboard</a>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- ====================== Form ====================== -->
    <div class="form-card">
        <form method="post" th:action="@{/member/bmi/calculate}">
            <div class="form-row">
                <div class="field">
                    <label>Weight (kg)</label>
                    <input type="number" name="weight" step="0.1" min="20" max="300"
                           th:value="${weight}" required />
                </div>
                <div class="field">
                    <label>Height (cm)</label>
                    <input type="number" name="height" step="0.1" min="100" max="250"
                           th:value="${height}" required />
                </div>
                <button type="submit" class="btn-primary">Calculate</button>
            </div>
        </form>
    </div>

    <!-- ====================== Result ====================== -->
    <div th:if="${hasResult}" class="result-card"
         th:classappend="'result-' + ${category}">

        <div class="bmi-value-row">
            <span class="bmi-value" th:text="${#numbers.formatDecimal(bmi, 1, 2)}">22.5</span>
            <span class="bmi-category" th:classappend="${category}" th:text="${category}">Normal</span>
        </div>

        <div class="bmi-meta">
            <span><strong>Weight:</strong> <span th:text="${weight} + ' kg'">70 kg</span></span>
            <span><strong>Height:</strong> <span th:text="${height} + ' cm'">170 cm</span></span>
            <span th:if="${memberGender != null}">
                <strong>Gender:</strong> <span th:text="${memberGender}">FEMALE</span>
            </span>
        </div>

        <!-- Daily calorie target (BmrStrategy result) -->
        <div th:if="${dailyCalories != null}" class="calorie-card">
            <span class="num" th:text="${#numbers.formatDecimal(dailyCalories, 1, 0)}">2000</span>
            <span class="lbl">kcal / day recommended</span>
        </div>

        <!-- Strategy-supplied advice list -->
        <div class="suggestions" th:if="${suggestions != null and suggestions.length > 0}">
            <h3>Suggestions for you</h3>
            <ul class="suggestion-list">
                <li th:each="s : ${suggestions}" th:text="${s}">Eat more protein.</li>
            </ul>
        </div>
    </div>

    <!-- ====================== BMI scale legend ====================== -->
    <div class="scale">
        <h3>BMI Scale (WHO)</h3>
        <div class="scale-row">
            <span class="scale-Underweight">Underweight &lt; 18.5</span>
            <span class="scale-Normal">Normal 18.5 – 24.9</span>
            <span class="scale-Overweight">Overweight 25 – 29.9</span>
            <span class="scale-Obese">Obese ≥ 30</span>
        </div>
    </div>
</div>
</body>
</html>
