<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ISC-MS — Payment History</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 960px; margin: 40px auto; padding: 32px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 24px; }
        h1 { margin: 0; color: #1d1d1f; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            text-align: left; padding: 12px 10px; background: #f9f9fb;
            border-bottom: 1px solid #e0e0e3; color: #6e6e73; font-weight: 500;
            text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;
        }
        tbody td { padding: 12px 10px; border-bottom: 1px solid #f5f5f7; }
        tbody tr:hover { background: #fafafc; }
        .amount   { font-weight: 500; color: #1d1d1f; }
        .pill {
            display: inline-block; padding: 2px 9px; border-radius: 10px;
            font-size: 11px; font-weight: 500;
        }
        .pill-PAID    { background: #f6ffed; color: #389e0d; }
        .pill-PENDING { background: #fffbe6; color: #ad6800; }
        .pill-FAILED  { background: #fff2f0; color: #cf1322; }
        .empty {
            text-align: center; padding: 60px 20px; color: #6e6e73;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Payment History</h1>
        <a th:href="@{/dashboard}" class="top-link">← Back to Dashboard</a>
    </div>

    <div th:if="${#lists.isEmpty(payments)}" class="empty">
        No payments recorded yet.
    </div>

    <table th:if="${!#lists.isEmpty(payments)}">
        <thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Description</th>
                <th>Method</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${payments}">
                <td th:text="${p.paymentDate.toLocalDate()}">2026-02-04</td>
                <td th:text="${p.paymentType}">MEMBERSHIP</td>
                <td th:text="${p.description}">Membership purchase</td>
                <td th:text="${p.paymentMethod != null} ? ${p.paymentMethod} : '-'">CASH</td>
                <td class="amount"
                    th:text="${#numbers.formatDecimal(p.amount, 1, 2) + ' TL'}">0.00 TL</td>
                <td>
                    <span class="pill"
                          th:classappend="'pill-' + ${p.status}"
                          th:text="${p.status}">PAID</span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
