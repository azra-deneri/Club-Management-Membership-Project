<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create' ? 'New Trainer' : 'Edit Trainer'} + ' — ISC-MS'">New Trainer</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 600px; margin: 32px auto; padding: 28px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        h1 { margin: 0; color: #1d1d1f; font-size: 24px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }
        .alert { padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }
        .alert-info  { background: #e6f7ff; border: 1px solid #91d5ff; color: #0050b3; }

        .field { margin-bottom: 14px; }
        .field label {
            display: block; font-size: 12px; color: #6e6e73;
            margin-bottom: 4px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .field input, .field select {
            width: 100%; padding: 10px 12px; font-size: 14px;
            border: 1px solid #d2d2d7; border-radius: 6px;
            box-sizing: border-box; background: white;
            font-family: inherit;
        }
        .field input:focus, .field select:focus { outline: none; border-color: #0071e3; }
        .hint { font-size: 11px; color: #6e6e73; margin-top: 4px; }

        .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn {
            padding: 11px 22px; border-radius: 6px; font-size: 14px;
            text-decoration: none; border: none; cursor: pointer; font-weight: 500;
        }
        .btn-primary   { background: #0071e3; color: white; }
        .btn-secondary { background: #f5f5f7; color: #1d1d1f; }
        .required { color: #cf1322; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="${mode == 'create' ? 'New Trainer' : 'Edit Trainer'}">New Trainer</h1>
        <a th:href="@{/manager/trainers}" class="top-link">← Back to Trainers</a>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form method="post"
          th:action="${mode == 'create' ? '/manager/trainers' : '/manager/trainers/' + trainerId}"
          th:object="${form}">

        <div class="field">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" th:field="*{fullName}" required maxlength="100"/>
        </div>

        <div class="field">
            <label>Username <span class="required">*</span></label>
            <input type="text" th:field="*{username}" required maxlength="50"
                   th:readonly="${mode == 'edit'}"/>
            <div class="hint" th:if="${mode == 'create'}">Used for trainer login. Must be unique.</div>
            <div class="hint" th:if="${mode == 'edit'}">
                Username cannot be changed after creation (used for login).
            </div>
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" th:field="*{email}" maxlength="100"
                   th:readonly="${mode == 'edit'}"/>
            <div class="hint" th:if="${mode == 'edit'}">
                Email cannot be changed after creation. Contact admin if a change is needed.
            </div>
        </div>

        <div class="field">
            <label>Specialty <span class="required">*</span></label>
            <select th:field="*{specialty}" required>
                <option value="FITNESS">Fitness</option>
                <option value="YOGA">Yoga</option>
                <option value="SWIMMING">Swimming</option>
                <option value="PILATES">Pilates</option>
                <option value="HIIT">HIIT</option>
            </select>
        </div>

        <div class="field" th:if="${mode == 'create'}">
            <label>Password <span class="required">*</span></label>
            <input type="password" th:field="*{password}"
                   required minlength="8" maxlength="100"/>
            <div class="hint">Minimum 8 characters. Cannot be reset from this panel later.</div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary"
                    th:text="${mode == 'create' ? 'Add Trainer' : 'Save Changes'}">Add Trainer</button>
            <a th:href="@{/manager/trainers}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
