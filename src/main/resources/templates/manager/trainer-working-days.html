<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Days — ISC-MS</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 720px; margin: 32px auto; padding: 28px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        h1 { margin: 0; color: #1d1d1f; font-size: 22px; }
        .header .subtitle { font-size: 13px; color: #6e6e73; margin-top: 4px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }
        .alert { padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #f6ffed; border: 1px solid #b7eb8f; color: #135200; }
        .alert-error   { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }
        .alert-info    { background: #e6f7ff; border: 1px solid #91d5ff; color: #0050b3; }

        table { width: 100%; border-collapse: collapse; font-size: 13px;
                background: #fafafa; border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 10px 12px; font-size: 11px; color: #6e6e73;
             text-transform: uppercase; letter-spacing: 0.5px;
             border-bottom: 1px solid #e0e0e3; background: #f5f5f7; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; color: #1d1d1f; }
        td input[type=time] {
            padding: 6px 8px; font-size: 13px;
            border: 1px solid #d2d2d7; border-radius: 4px;
            font-family: inherit;
        }
        td input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

        .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 6px; font-size: 14px;
               text-decoration: none; border: none; cursor: pointer; font-weight: 500; }
        .btn-primary   { background: #0071e3; color: white; }
        .btn-secondary { background: #f5f5f7; color: #1d1d1f; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>Working Days</h1>
            <div class="subtitle" th:text="${trainer.fullName} + ' · ' + ${trainer.specialty}">Trainer · Specialty</div>
        </div>
        <a th:href="@{/manager/trainers}" class="top-link">← Back to Trainers</a>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>


    <form method="post" th:action="@{|/manager/trainers/${trainer.trainerId}/working-days|}">
        <table>
            <thead>
            <tr>
                <th style="width: 60px;">Active</th>
                <th>Day</th>
                <th>Start</th>
                <th>End</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rows}">
                <td>
                    <input type="checkbox" th:name="|active_${r.day}|"
                           th:checked="${r.active}"/>
                </td>
                <td th:text="${r.day}">MONDAY</td>
                <td>
                    <input type="time" th:name="|start_${r.day}|" th:value="${r.start}" step="60"/>
                </td>
                <td>
                    <input type="time" th:name="|end_${r.day}|" th:value="${r.end}" step="60"/>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Save Working Days</button>
            <a th:href="@{/manager/trainers}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
