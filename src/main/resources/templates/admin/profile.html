<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — ISC-MS Admin</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 640px; margin: 32px auto; padding: 28px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header { display: flex; justify-content: space-between; align-items: center;
                  margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        h1 { margin: 0; color: #1d1d1f; font-size: 24px; }
        h2 { color: #1d1d1f; font-size: 18px; margin: 24px 0 12px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }

        .alert { padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #f6ffed; border: 1px solid #b7eb8f; color: #135200; }
        .alert-error   { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }

        .info-grid {
            background: #fafafa; border: 1px solid #ececec;
            border-radius: 8px; padding: 14px 16px;
        }
        .info-row {
            display: flex; padding: 8px 0; border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            font-size: 11px; color: #6e6e73; text-transform: uppercase;
            letter-spacing: 0.5px; width: 130px; padding-top: 2px;
        }
        .info-value { font-size: 14px; color: #1d1d1f; font-weight: 500; }
        .role-pill {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
            background: #f0e7ff; color: #3c1e64;
        }

        .field { margin-bottom: 14px; }
        .field label {
            display: block; font-size: 12px; color: #6e6e73;
            margin-bottom: 4px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .field input {
            width: 100%; padding: 10px 12px; font-size: 14px;
            border: 1px solid #d2d2d7; border-radius: 6px;
            box-sizing: border-box; font-family: inherit;
        }
        .field input:focus { outline: none; border-color: #0071e3; }
        .hint { font-size: 11px; color: #6e6e73; margin-top: 4px; }
        .required { color: #cf1322; }

        .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn {
            padding: 11px 22px; border-radius: 6px; font-size: 14px;
            text-decoration: none; border: none; cursor: pointer; font-weight: 500;
        }
        .btn-primary   { background: #3c1e64; color: white; }
        .btn-secondary { background: #f5f5f7; color: #1d1d1f; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>My Profile</h1>
        <a th:href="@{/admin/dashboard}" class="top-link">← Back to Admin</a>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>

    <h2>Account Information</h2>
    <div class="info-grid">
        <div class="info-row">
            <div class="info-label">Full Name</div>
            <div class="info-value" th:text="${admin.fullName}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Email</div>
            <div class="info-value" th:text="${admin.email}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Username</div>
            <div class="info-value" th:text="${admin.username}">—</div>
        </div>
        <div class="info-row">
            <div class="info-label">Role</div>
            <div class="info-value">
                <span class="role-pill" th:text="${admin.role}">ADMIN</span>
            </div>
        </div>
    </div>

    <h2>Change Password</h2>
    <form method="post" th:action="@{/admin/profile/password}">

        <div class="field">
            <label>Current Password <span class="required">*</span></label>
            <input type="password" name="currentPassword" required minlength="1"
                   autocomplete="current-password"/>
        </div>

        <div class="field">
            <label>New Password <span class="required">*</span></label>
            <input type="password" name="newPassword" required minlength="8" maxlength="100"
                   autocomplete="new-password"/>
            <div class="hint">Minimum 8 characters. Must be different from your current password.</div>
        </div>

        <div class="field">
            <label>Confirm New Password <span class="required">*</span></label>
            <input type="password" name="confirmPassword" required minlength="8" maxlength="100"
                   autocomplete="new-password"/>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Change Password</button>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
