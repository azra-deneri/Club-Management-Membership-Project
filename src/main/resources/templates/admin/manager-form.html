<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Manager — ISC-MS Admin</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 600px; margin: 32px auto; padding: 28px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px;
        }
        h1 { margin: 0; color: #1d1d1f; font-size: 22px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }
        .alert {
            padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px;
            background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322;
        }
        .field { margin-bottom: 14px; }
        label {
            display: block; margin-bottom: 5px;
            font-size: 11px; font-weight: 600; color: #6e6e73;
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        input[type=text], input[type=email], input[type=password], select {
            width: 100%; padding: 10px 12px;
            font-size: 14px; border: 1px solid #d2d2d7;
            border-radius: 6px; box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #0071e3; }
        .helper { font-size: 11px; color: #6e6e73; margin-top: 4px; }
        .actions { display: flex; gap: 10px; margin-top: 18px; }
        .btn {
            padding: 10px 18px; font-size: 14px; font-weight: 500;
            border: none; border-radius: 6px; cursor: pointer; text-decoration: none;
        }
        .btn-primary   { background: #3c1e64; color: white; }
        .btn-secondary { background: #f5f5f7; color: #1d1d1f; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Add Manager</h1>
        <a th:href="@{/admin/managers}" class="top-link">← Back to Managers</a>
    </div>

    <div class="alert" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/admin/managers/new}">
        <div class="field">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName"
                   th:value="${fullName}" required>
        </div>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   th:value="${username}" required>
            <div class="helper">Used for login (Trainer-style identifier). Must be unique.</div>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"
                   th:value="${email}" required>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <div class="helper">Minimum 8 characters.</div>
        </div>

        <div class="field">
            <label for="role">Role</label>
            <select id="role" name="role" required>
                <option value="MANAGER" th:selected="${role == null or role == 'MANAGER'}">MANAGER</option>
                <option value="ADMIN"   th:selected="${role == 'ADMIN'}">ADMIN</option>
            </select>
            <div class="helper">ADMIN role grants access to this admin panel.</div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Add Manager</button>
            <a th:href="@{/admin/managers}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
