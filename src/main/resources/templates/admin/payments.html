<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Payments — ISC-MS Admin</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; }
        .container {
            max-width: 1200px; margin: 32px auto; padding: 28px;
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
        }
        h1 { margin: 0; color: #1d1d1f; font-size: 24px; }
        .top-link {
            padding: 8px 16px; background: #f5f5f7; color: #1d1d1f;
            text-decoration: none; border-radius: 6px; font-size: 13px;
        }

        .filter-bar {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            background: #fafafa; border: 1px solid #ececec; border-radius: 8px;
            padding: 10px 12px; margin-bottom: 12px;
        }
        .filter-bar label {
            font-size: 11px; color: #6e6e73; text-transform: uppercase;
            letter-spacing: 0.5px; font-weight: 600;
        }
        .filter-bar select {
            padding: 6px 10px; font-size: 12px;
            border: 1px solid #d2d2d7; border-radius: 6px;
            background: white; cursor: pointer;
        }
        .filter-bar .btn-apply {
            background: #0071e3; color: white; padding: 6px 14px;
            font-size: 12px; border-radius: 6px; border: none; cursor: pointer;
        }
        .filter-bar .btn-reset {
            background: #f5f5f7; color: #1d1d1f; padding: 6px 14px;
            font-size: 12px; border-radius: 6px; text-decoration: none;
        }
        .filter-bar .row-count {
            font-size: 11px; color: #6e6e73; margin-left: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f5f5f7; }
        th { text-align: left; padding: 10px 12px; font-size: 11px; color: #6e6e73;
             text-transform: uppercase; letter-spacing: 0.5px;
             border-bottom: 1px solid #e0e0e3; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; color: #1d1d1f; }
        tr:hover { background: #fafafa; }
        td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

        .pill { display: inline-block; padding: 2px 10px; border-radius: 12px;
                font-size: 11px; font-weight: 600; }
        .pill-PAID      { background: #f6ffed; color: #135200; }
        .pill-PENDING   { background: #fff7e6; color: #874d00; }
        .pill-OVERDUE   { background: #fff1f0; color: #a8071a; }
        .pill-CANCELLED { background: #f5f5f7; color: #6e6e73; }
        .pill-REFUNDED  { background: #e6f4ff; color: #0050b3; }

        .empty-state {
            text-align: center; padding: 32px; color: #6e6e73;
            font-style: italic; font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>All Payments</h1>
        <a th:href="@{/admin/dashboard}" class="top-link">← Back to Admin</a>
    </div>

    <form method="get" th:action="@{/admin/payments}" class="filter-bar">
        <label for="type">Type</label>
        <select id="type" name="type">
            <option value="ALL"         th:selected="${typeFilter == 'ALL'}">All Types</option>
            <option value="MEMBERSHIP"  th:selected="${typeFilter == 'MEMBERSHIP'}">Membership</option>
            <option value="INSTALLMENT" th:selected="${typeFilter == 'INSTALLMENT'}">Installment</option>
            <option value="PT_PACKAGE"  th:selected="${typeFilter == 'PT_PACKAGE'}">PT Package</option>
            <option value="EVENT"       th:selected="${typeFilter == 'EVENT'}">Event</option>
        </select>

        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="ALL"       th:selected="${statusFilter == 'ALL'}">All Statuses</option>
            <option value="PAID"      th:selected="${statusFilter == 'PAID'}">Paid</option>
            <option value="PENDING"   th:selected="${statusFilter == 'PENDING'}">Pending</option>
            <option value="OVERDUE"   th:selected="${statusFilter == 'OVERDUE'}">Overdue</option>
            <option value="CANCELLED" th:selected="${statusFilter == 'CANCELLED'}">Cancelled</option>
            <option value="REFUNDED"  th:selected="${statusFilter == 'REFUNDED'}">Refunded</option>
        </select>

        <button type="submit" class="btn-apply">Apply</button>
        <a th:href="@{/admin/payments}" class="btn-reset">Reset</a>

        <span class="row-count"
              th:text="'Showing ' + ${payments.size()} + ' of ' + ${totalCount} + ' payments'">
            Showing 0 of 0
        </span>
    </form>

    <table th:if="${!payments.isEmpty()}">
        <thead>
        <tr>
            <th class="num">Amount</th>
            <th>Date</th>
            <th>Type</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${payments}">
            <td class="num" th:text="${#numbers.formatDecimal(p.amount, 1, 2)} + ' TL'">0.00 TL</td>
            <td th:text="${p.date}">2026-05-25</td>
            <td th:text="${p.type}">INSTALLMENT</td>
            <td>
                <span class="pill" th:classappend="'pill-' + ${p.status}"
                      th:text="${p.status}">PAID</span>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="empty-state" th:if="${payments.isEmpty()}">
        No payments match the selected filters.
    </div>
</div>
</body>
</html>
