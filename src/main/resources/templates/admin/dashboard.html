<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Istanbul Sports Club</title>
    <link rel="stylesheet" th:href="@{/css/iscms.css}"/>
</head>
<body>

<!-- TOP BRANDING BAR -->
<header class="gym-topbar">
    <a th:href="@{/admin/dashboard}" class="gym-brand">
        <span class="gym-brand-mark">🏋️</span>
        ISTANBUL <span class="gym-brand-accent">SPORTS</span> CLUB
    </a>
    <div class="gym-topbar-right">
        <a th:href="@{/logout}" class="gym-signout">Sign Out</a>
    </div>
</header>

<div class="gym-wrap">

    <!-- WELCOME CARD -->
    <section class="welcome-card">
        <div class="welcome-greeting">Admin Console</div>
        <h1 class="welcome-name">
            Welcome, <span th:text="${admin.fullName}">Admin</span>
        </h1>
        <div class="welcome-meta">
            <span class="gym-pill gym-pill-role">ADMIN</span>
        </div>
    </section>

    <!-- ADMIN ACTIONS -->
    <section class="gym-nav-card">
        <div class="gym-nav-title">Admin-only actions</div>
        <div class="gym-nav-grid">
            <a th:href="@{/admin/managers}" class="gym-nav-tile">
                <span class="gym-nav-icon">👥</span> Managers
            </a>
            <a th:href="@{/admin/managers/new}" class="gym-nav-tile">
                <span class="gym-nav-icon">➕</span> Add Manager
            </a>
            <a th:href="@{/admin/payments}" class="gym-nav-tile">
                <span class="gym-nav-icon">💳</span> All Payments
            </a>
            <a th:href="@{/admin/profile}" class="gym-nav-tile">
                <span class="gym-nav-icon">👤</span> My Profile
            </a>
        </div>
    </section>


</div>
</body>
</html>
